<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>InvestCheck</title>
<style>
  :root {
    --ink: #1A2238;
    --paper: #FAF8F3;
    --teal: #1D9E75;
    --clay: #C2742B;
    --muted: #6B6F7B;
    --hair: rgba(26,34,56,0.12);
    --card: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 32px 16px;
    background: var(--paper);
    display: flex;
    justify-content: center;
    font-family: 'Assistant', system-ui, -apple-system, sans-serif;
  }
  #app {
    width: 100%;
    max-width: 640px;
    background: var(--paper);
    color: var(--ink);
    border-radius: 16px;
    padding: 28px 28px 24px;
    border: 1px solid var(--hair);
  }
  .row { display: flex; }
  .eyebrow {
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); font-weight: 600;
  }
  .display { font-family: Georgia, 'Times New Roman', serif; font-weight: 600; }
  .mono { font-family: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace; }
  button { font-family: 'Assistant', system-ui, sans-serif; cursor: pointer; }
  input { font-family: 'Assistant', system-ui, sans-serif; }
  input:focus, button:focus-visible { outline: 2px solid var(--teal); outline-offset: 1px; }
  .btn-primary {
    background: var(--ink); color: var(--paper); border: none; border-radius: 10px;
    padding: 10px 16px; font-size: 14px; font-weight: 600;
  }
  .btn-primary:disabled { opacity: 0.6; cursor: default; }
  .btn-ghost {
    background: none; border: 1px solid var(--hair); border-radius: 8px;
    padding: 6px 12px; font-size: 13px; font-weight: 600; color: var(--ink);
  }
  .btn-teal {
    background: var(--teal); color: #fff; border: none; border-radius: 8px;
    padding: 9px 16px; font-size: 14px; font-weight: 600;
  }
  .btn-teal:disabled { opacity: 0.6; cursor: default; }
  .btn-plain { background: none; border: none; color: var(--muted); font-size: 13px; font-weight: 600; }
  .field {
    font-size: 14px; padding: 9px 12px; border-radius: 8px;
    border: 1px solid rgba(26,34,56,0.2); background: #fff; color: var(--ink); outline: none;
  }
  .panel { background: var(--card); border: 1px solid var(--hair); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 8px; }
  .deposit-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-top: 1px solid var(--hair); }
  .rate-card { background: var(--card); border: 1px solid var(--hair); border-radius: 12px; padding: 14px 16px; }
  .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; line-height: 1; }
  .fund-card { background: var(--card); border: 1px solid var(--hair); border-radius: 12px; padding: 14px 16px; margin-top: 10px; cursor: pointer; }
  .fund-card:hover { border-color: rgba(26,34,56,0.3); }
  .mode-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  @media (prefers-color-scheme: dark) {
    :root { --ink: #ECE9E2; --paper: #1B1D24; --card: #24262F; --hair: rgba(236,233,226,0.14); --muted: #9A9DA8; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
const nis = (n) => new Intl.NumberFormat("he-IL", { style: "currency", currency: "ILS", maximumFractionDigits: 0 }).format(Math.round(n));
const pct = (n) => `${n >= 0 ? "+" : ""}${n.toFixed(1)}%`;
const num = (n, d = 2) => new Intl.NumberFormat("en-US", { maximumFractionDigits: d, minimumFractionDigits: d }).format(n);
const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

const SEED = [{ id: "seed-1", amountNIS: 79005, date: "2024-12-31", spxAt: 5881.63, fxAt: 3.66, hedged: false }];
const FALLBACK = { spx: 7500.58, usdils: 2.96, asOf: "18 Jun 2026 (cached)" };

async function fetchRates(date) {
  const qs = date ? `?date=${encodeURIComponent(date)}` : "";
  const res = await fetch(`/api/rates${qs}`);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Request failed");
  return data;
}

function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}

// One-time migration from the old single-fund shape (`deposits` + `monthlyPlan`)
// to the new `funds` list. Groups old deposits/plan by their old per-deposit
// `hedged` flag since hedged is now a per-fund setting.
function migrateLegacy() {
  const existing = loadJSON("funds", null);
  if (existing) return existing;

  const oldDeposits = loadJSON("deposits", SEED);
  const oldPlan = loadJSON("monthlyPlan", null);
  const groups = {};

  for (const d of oldDeposits) {
    const key = d.hedged ? "hedged" : "unhedged";
    if (!groups[key]) {
      groups[key] = { id: `fund-${key}`, name: `S&P 500 fund (${key})`, hedged: !!d.hedged, deposits: [], plan: null };
    }
    groups[key].deposits.push({ id: d.id, amountNIS: d.amountNIS, date: d.date, spxAt: d.spxAt, fxAt: d.fxAt });
  }

  if (oldPlan) {
    const key = oldPlan.hedged ? "hedged" : "unhedged";
    if (!groups[key]) {
      groups[key] = { id: `fund-${key}`, name: `S&P 500 fund (${key})`, hedged: !!oldPlan.hedged, deposits: [], plan: null };
    }
    groups[key].plan = { startDate: oldPlan.startDate, amount: oldPlan.amount };
  }

  const funds = Object.values(groups);
  if (funds.length === 0) {
    funds.push({ id: "fund-default", name: "S&P 500 fund", hedged: false, deposits: [], plan: null });
  }

  saveJSON("funds", funds);
  localStorage.removeItem("deposits");
  localStorage.removeItem("monthlyPlan");
  return funds;
}

const S = {
  screen: "home", // "home" | "fund"
  activeFundId: null,
  funds: migrateLegacy(),
  rates: FALLBACK,
  loading: false,
  error: "",

  // fund creation flow (Home page)
  creatingFund: false,
  newFund: {
    name: "",
    hedged: false,
    mode: null, // null | "monthly" | "single"
    form: { amount: "", date: "" },
    planForm: { amount: "", startDate: "" },
  },
  newFundBusy: false,
  newFundProgress: "",

  // per-fund deposit management (Fund page)
  adding: false,
  form: { amount: "", date: "" },
  addBusy: false,
  editingId: null,
  editForm: { amount: "", date: "" },
  editBusy: false,
  planning: false,
  planForm: { startDate: "", amount: "" },
  syncBusy: false,
  syncProgress: "",
};

function activeFund() {
  return S.funds.find((f) => f.id === S.activeFundId);
}
function persistFunds() {
  saveJSON("funds", S.funds);
}

function planDates(startDate) {
  const start = new Date(startDate + "T00:00:00");
  const today = new Date();
  const day = start.getDate();
  const out = [];
  let y = start.getFullYear(), m = start.getMonth();
  while (true) {
    const lastDay = new Date(y, m + 1, 0).getDate();
    const d = new Date(y, m, Math.min(day, lastDay));
    if (d > today) break;
    out.push(d.toISOString().slice(0, 10));
    m += 1;
    if (m > 11) { m = 0; y += 1; }
  }
  return out;
}

function calcFund(fund) {
  const deposits = fund.deposits.map((d) => {
    const indexFactor = S.rates.spx / d.spxAt;
    const fxFactor = fund.hedged ? 1 : S.rates.usdils / d.fxAt;
    const current = d.amountNIS * indexFactor * fxFactor;
    const noFx = d.amountNIS * indexFactor;
    return { ...d, current, noFx, indexFactor, fxFactor };
  });
  const invested = deposits.reduce((s, d) => s + d.amountNIS, 0);
  const current = deposits.reduce((s, d) => s + d.current, 0);
  const noFx = deposits.reduce((s, d) => s + d.noFx, 0);
  const indexEffect = noFx - invested;
  const fxEffect = current - noFx;
  const net = current - invested;
  const retPct = invested ? (net / invested) * 100 : 0;
  return { deposits, invested, current, noFx, indexEffect, fxEffect, net, retPct };
}

async function refresh() {
  S.loading = true; S.error = ""; render();
  try {
    const r = await fetchRates();
    if (!r.spx || !r.usdils) throw new Error("Incomplete rate data");
    S.rates = { spx: Number(r.spx), usdils: Number(r.usdils), asOf: r.asOf || "just now" };
  } catch (e) {
    S.error = `Couldn't refresh rates just now (${e.message}). Showing the last figures — try again in a moment.`;
  } finally {
    S.loading = false; render();
  }
}

// Fetches any missing months for fund.plan and appends them to fund.deposits.
// Partial progress is kept (and persisted) even if a later month fails.
async function syncPlan(fund, onProgress) {
  if (!fund || !fund.plan) return;
  const wanted = planDates(fund.plan.startDate);
  const have = new Set(fund.deposits.filter((d) => d.id.startsWith("plan-")).map((d) => d.id));
  const missing = wanted.filter((date) => !have.has(`plan-${date}`));
  if (missing.length === 0) return;

  const added = [];
  for (let i = 0; i < missing.length; i++) {
    const date = missing[i];
    onProgress?.(`Fetching ${date} (${i + 1}/${missing.length})…`);
    let r;
    try {
      r = await fetchRates(date);
    } catch (e) {
      if (added.length) { fund.deposits = [...fund.deposits, ...added]; persistFunds(); }
      throw new Error(`sync stopped: ${e.message}. Added ${added.length} of ${missing.length} months`);
    }
    if (!r.spx || !r.usdils) {
      if (added.length) { fund.deposits = [...fund.deposits, ...added]; persistFunds(); }
      throw new Error(`no historical data for ${date}. Added ${added.length} of ${missing.length} months`);
    }
    added.push({ id: `plan-${date}`, amountNIS: fund.plan.amount, date, spxAt: Number(r.spx), fxAt: Number(r.usdils) });
  }
  fund.deposits = [...fund.deposits, ...added];
  persistFunds();
}

async function runSyncPlan() {
  const fund = activeFund();
  if (!fund) return;
  S.syncBusy = true; S.error = ""; render();
  try {
    await syncPlan(fund, (msg) => { S.syncProgress = msg; render(); });
  } catch (e) {
    S.error = `Monthly plan ${e.message} — try syncing again.`;
  } finally {
    S.syncBusy = false; S.syncProgress = ""; render();
  }
}

async function addDeposit() {
  if (!S.form.amount || !S.form.date) return;
  const fund = activeFund();
  if (!fund) return;
  S.addBusy = true; S.error = ""; render();
  try {
    const r = await fetchRates(S.form.date);
    if (!r.spx || !r.usdils) throw new Error("No historical data");
    fund.deposits = [...fund.deposits, {
      id: `d-${Date.now()}`,
      amountNIS: Number(S.form.amount), date: S.form.date,
      spxAt: Number(r.spx), fxAt: Number(r.usdils),
    }];
    persistFunds();
    S.form = { amount: "", date: "" };
    S.adding = false;
  } catch (e) {
    S.error = `Couldn't find market data for ${S.form.date}. Check the date (a trading day) and retry.`;
  } finally {
    S.addBusy = false; render();
  }
}

function startEdit(d) {
  S.editingId = d.id;
  S.editForm = { amount: String(d.amountNIS), date: d.date };
  S.error = ""; render();
}

async function saveEdit(orig) {
  if (!S.editForm.amount || !S.editForm.date) return;
  const fund = activeFund();
  if (!fund) return;
  S.editBusy = true; S.error = ""; render();
  try {
    let spxAt = orig.spxAt, fxAt = orig.fxAt;
    if (S.editForm.date !== orig.date) {
      const r = await fetchRates(S.editForm.date);
      if (!r.spx || !r.usdils) throw new Error("No historical data");
      spxAt = Number(r.spx); fxAt = Number(r.usdils);
    }
    fund.deposits = fund.deposits.map((x) => x.id === orig.id ? {
      ...x, amountNIS: Number(S.editForm.amount), date: S.editForm.date, spxAt, fxAt,
    } : x);
    persistFunds();
    S.editingId = null;
  } catch (e) {
    S.error = `Couldn't find market data for ${S.editForm.date}. Check the date (a trading day) and retry.`;
  } finally {
    S.editBusy = false; render();
  }
}

function remove(id) {
  const fund = activeFund();
  if (!fund) return;
  fund.deposits = fund.deposits.filter((x) => x.id !== id);
  persistFunds();
  render();
}

async function savePlan() {
  if (!S.planForm.amount || !S.planForm.startDate) return;
  const fund = activeFund();
  if (!fund) return;
  fund.plan = { startDate: S.planForm.startDate, amount: Number(S.planForm.amount) };
  S.planning = false;
  persistFunds();
  render();
  await runSyncPlan();
}

function removePlan() {
  const fund = activeFund();
  if (!fund) return;
  fund.plan = null;
  fund.deposits = fund.deposits.filter((x) => !x.id.startsWith("plan-"));
  persistFunds();
  render();
}

function toggleNewFund() {
  S.creatingFund = !S.creatingFund;
  S.error = "";
  if (S.creatingFund) {
    S.newFund = { name: "", hedged: false, mode: null, form: { amount: "", date: "" }, planForm: { amount: "", startDate: "" } };
  }
  render();
}

function setNewFundMode(mode) {
  S.newFund.mode = mode;
  render();
}

async function createFund() {
  const nf = S.newFund;
  if (!nf.name.trim()) { S.error = "Give the fund a name."; render(); return; }
  if (!nf.mode) { S.error = "Choose monthly plan or single deposit."; render(); return; }
  if (nf.mode === "single" && (!nf.form.amount || !nf.form.date)) return;
  if (nf.mode === "monthly" && (!nf.planForm.amount || !nf.planForm.startDate)) return;

  S.newFundBusy = true; S.error = ""; render();

  const fund = {
    id: `fund-${Date.now()}`,
    name: nf.name.trim(),
    hedged: nf.hedged,
    deposits: [],
    plan: nf.mode === "monthly" ? { startDate: nf.planForm.startDate, amount: Number(nf.planForm.amount) } : null,
  };

  try {
    if (nf.mode === "single") {
      const r = await fetchRates(nf.form.date);
      if (!r.spx || !r.usdils) throw new Error("No historical data");
      fund.deposits.push({
        id: `d-${Date.now()}`,
        amountNIS: Number(nf.form.amount), date: nf.form.date,
        spxAt: Number(r.spx), fxAt: Number(r.usdils),
      });
      S.funds = [...S.funds, fund];
      persistFunds();
    } else {
      S.funds = [...S.funds, fund];
      persistFunds();
      await syncPlan(fund, (msg) => { S.newFundProgress = msg; render(); });
    }

    S.creatingFund = false;
    S.screen = "fund";
    S.activeFundId = fund.id;
  } catch (e) {
    if (nf.mode === "monthly") {
      // fund was already added with whatever months synced before the error
      S.error = `Monthly plan ${e.message} — you can retry from the fund's page.`;
      S.creatingFund = false;
      S.screen = "fund";
      S.activeFundId = fund.id;
    } else {
      S.error = `Couldn't find market data for ${nf.form.date}. Check the date (a trading day) and retry.`;
    }
  } finally {
    S.newFundBusy = false; S.newFundProgress = ""; render();
  }
}

function bar(top, height, color, solid) {
  return `<div style="position:relative;height:100%">
    <div style="position:absolute;left:0;right:0;top:${top}px;height:${height}px;
      background:${solid ? color : "transparent"};border:${solid ? "none" : `2px solid ${color}`};
      background-color:${solid ? color : color + "22"};border-radius:6px;"></div>
  </div>`;
}
function foot(label, value, color) {
  return `<div style="text-align:center">
    <div style="font-size:12px;color:var(--muted);font-weight:600">${esc(label)}</div>
    <div class="mono" style="font-size:14px;font-weight:600;color:${color};margin-top:2px">${esc(value)}</div>
  </div>`;
}
function rateCard(title, now, sub, delta, up) {
  return `<div class="rate-card">
    <div style="font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);font-weight:600">${esc(title)}</div>
    <div class="display" style="font-size:28px;margin-top:4px">${esc(now)}</div>
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:2px">
      <span class="mono" style="font-size:12px;color:var(--muted)">${esc(sub)}</span>
      <span style="font-size:13px;font-weight:600;color:${up ? "var(--teal)" : "var(--clay)"}">${esc(delta)}</span>
    </div>
  </div>`;
}

function render() {
  if (S.screen === "fund") renderFundPage();
  else renderHome();
}

function renderHome() {
  const perFund = S.funds.map((f) => ({ fund: f, calc: calcFund(f) }));
  const invested = perFund.reduce((s, x) => s + x.calc.invested, 0);
  const current = perFund.reduce((s, x) => s + x.calc.current, 0);
  const net = current - invested;
  const retPct = invested ? (net / invested) * 100 : 0;
  const nf = S.newFund;

  const html = `
    <div class="row" style="justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
      <div>
        <div class="eyebrow">InvestCheck</div>
        <div class="display" style="font-size:26px;margin-top:2px">All funds, in your currency</div>
      </div>
    </div>

    <div class="mono" style="font-size:13px;color:var(--muted);margin-top:8px">${S.loading ? "Refreshing rates…" : `rates as of ${esc(S.rates.asOf)}`}</div>

    ${S.error ? `<div style="margin-top:12px;background:rgba(194,116,43,0.12);color:var(--clay);border-radius:10px;padding:10px 14px;font-size:14px">${esc(S.error)}</div>` : ""}

    <div class="row" style="margin-top:22px;align-items:baseline;gap:16px;flex-wrap:wrap">
      <div class="display" style="font-size:48px;line-height:1">${nis(current)}</div>
      <div style="font-size:18px;font-weight:600;color:${net >= 0 ? "var(--teal)" : "var(--clay)"}">
        ${pct(retPct)} · ${net >= 0 ? "+" : ""}${nis(net)}
      </div>
    </div>
    <div style="font-size:14px;color:var(--muted);margin-top:4px">from ${nis(invested)} invested across ${S.funds.length} fund${S.funds.length === 1 ? "" : "s"}</div>

    <div style="margin-top:28px">
      <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="eyebrow">Funds</div>
        <button class="btn-ghost" id="btn-toggle-new-fund">${S.creatingFund ? "Cancel" : "+ New fund"}</button>
      </div>

      ${S.creatingFund ? `
        <div class="panel">
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
            <input class="field" type="text" placeholder="Fund name" id="nf-name" value="${esc(nf.name)}" style="flex:1;min-width:160px" />
            <label style="display:flex;align-items:center;gap:6px;font-size:14px">
              <input type="checkbox" id="nf-hedged" ${nf.hedged ? "checked" : ""} /> Hedged
            </label>
          </div>
          <div style="display:flex;gap:8px;margin-top:12px">
            <button class="btn-ghost mode-btn ${nf.mode === "monthly" ? "active" : ""}" id="nf-mode-monthly">Monthly plan</button>
            <button class="btn-ghost mode-btn ${nf.mode === "single" ? "active" : ""}" id="nf-mode-single">Single deposit</button>
          </div>

          ${nf.mode === "monthly" ? `
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px">
              <input class="field" type="number" placeholder="Monthly amount (₪)" id="nf-plan-amount" value="${esc(nf.planForm.amount)}" />
              <input class="field" type="date" id="nf-plan-date" value="${esc(nf.planForm.startDate)}" />
            </div>
            <div class="hint">Deposits the same amount every month on this day, starting from the start date, through the current month. I'll look up market data for each month automatically.</div>
          ` : ""}

          ${nf.mode === "single" ? `
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px">
              <input class="field" type="number" placeholder="Amount (₪)" id="nf-amount" value="${esc(nf.form.amount)}" />
              <input class="field" type="date" id="nf-date" value="${esc(nf.form.date)}" />
            </div>
            <div class="hint">I'll look up the S&amp;P 500 and USD/ILS rate for that date automatically.</div>
          ` : ""}

          ${nf.mode ? `
            <div style="margin-top:14px">
              <button class="btn-teal" id="btn-create-fund" ${S.newFundBusy ? "disabled" : ""}>${S.newFundBusy ? (S.newFundProgress || "Creating…") : "Create fund"}</button>
            </div>
          ` : ""}
        </div>
      ` : ""}

      ${S.funds.length === 0 ? `
        <div class="hint" style="margin-top:12px">No funds yet — create one to get started.</div>
      ` : perFund.map(({ fund, calc }) => `
        <div class="fund-card" data-fund="${esc(fund.id)}">
          <div class="row" style="justify-content:space-between;align-items:center">
            <div>
              <div style="font-weight:600;font-size:15px">${esc(fund.name)}${fund.hedged ? ` <span class="mono" style="font-size:12px;color:var(--muted)">· hedged</span>` : ""}</div>
              <div class="mono" style="font-size:13px;color:var(--muted)">${nis(calc.invested)} invested</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:600;font-size:15px">${nis(calc.current)}</div>
              <div style="font-size:13px;color:${calc.net >= 0 ? "var(--teal)" : "var(--clay)"}">${pct(calc.retPct)}</div>
            </div>
          </div>
        </div>
      `).join("")}
    </div>

    <div style="font-size:12px;color:var(--muted);margin-top:20px;line-height:1.6;border-top:1px solid var(--hair);padding-top:14px">
      Figures use index price levels; reinvested dividends (~1.2%/yr) and fund fees roughly offset and aren't separately modeled. Refresh pulls the latest available close — not live tick data. Paper value only; nothing is realized until you sell.
    </div>
  `;

  document.getElementById("app").innerHTML = html;
  wireHome();
}

function renderFundPage() {
  const fund = activeFund();
  if (!fund) { S.screen = "home"; render(); return; }

  const calc = calcFund(fund);
  const { deposits, invested, current, noFx, indexEffect, fxEffect, net, retPct } = calc;
  const peak = Math.max(invested, noFx, current, 1);
  const H = 190;
  const h = (v) => Math.max(2, (v / peak) * H);
  const first = fund.deposits[0];

  const html = `
    <div class="row" style="justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
      <div>
        <button class="btn-plain" id="btn-back-home" style="padding:0;margin-bottom:6px">← All funds</button>
        <div class="eyebrow">${esc(fund.name)}${fund.hedged ? " · hedged" : ""}</div>
        <div class="display" style="font-size:26px;margin-top:2px">S&amp;P 500, in your currency</div>
      </div>
    </div>

    <div class="mono" style="font-size:13px;color:var(--muted);margin-top:8px">${S.loading ? "Refreshing rates…" : `rates as of ${esc(S.rates.asOf)}`}</div>

    ${S.error ? `<div style="margin-top:12px;background:rgba(194,116,43,0.12);color:var(--clay);border-radius:10px;padding:10px 14px;font-size:14px">${esc(S.error)}</div>` : ""}

    <div class="row" style="margin-top:22px;align-items:baseline;gap:16px;flex-wrap:wrap">
      <div class="display" style="font-size:48px;line-height:1">${nis(current)}</div>
      <div style="font-size:18px;font-weight:600;color:${net >= 0 ? "var(--teal)" : "var(--clay)"}">
        ${pct(retPct)} · ${net >= 0 ? "+" : ""}${nis(net)}
      </div>
    </div>
    <div style="font-size:14px;color:var(--muted);margin-top:4px">from ${nis(invested)} invested</div>

    <div style="margin-top:28px">
      <div class="eyebrow" style="margin-bottom:14px">What moved your money</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;align-items:end;height:${H}px">
        ${bar(H - h(invested), h(invested), "var(--ink)", true)}
        ${bar(H - h(noFx), h(noFx) - h(invested), "var(--teal)", false)}
        ${bar(H - h(noFx), h(noFx) - h(current), "var(--clay)", false)}
        ${bar(H - h(current), h(current), "var(--ink)", true)}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;margin-top:10px">
        ${foot("Invested", nis(invested), "var(--ink)")}
        ${foot("Index", `+${nis(indexEffect)}`, "var(--teal)")}
        ${foot("Currency", `${nis(fxEffect)}`, "var(--clay)")}
        ${foot("Today", nis(current), "var(--ink)")}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:28px">
      ${rateCard("S&P 500", num(S.rates.spx, 0), `entry ${num(first?.spxAt ?? 0, 0)} → now`, first ? pct((S.rates.spx / first.spxAt - 1) * 100) : "", true)}
      ${rateCard("USD / ILS", num(S.rates.usdils, 3), `entry ${num(first?.fxAt ?? 0, 2)} → now`, first ? pct((S.rates.usdils / first.fxAt - 1) * 100) : "", false)}
    </div>

    <div style="margin-top:28px">
      <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="eyebrow">Deposits</div>
        <div style="display:flex;gap:8px">
          <button class="btn-ghost" id="btn-toggle-plan">${S.planning ? "Cancel" : fund.plan ? "Edit monthly plan" : "+ Monthly plan"}</button>
          <button class="btn-ghost" id="btn-toggle-add">${S.adding ? "Cancel" : "+ Add deposit"}</button>
        </div>
      </div>

      ${fund.plan && !S.planning ? `
        <div class="panel" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
          <div style="font-size:14px">
            <span style="font-weight:600">${nis(fund.plan.amount)}/month</span>
            <span style="color:var(--muted)"> · since ${esc(fund.plan.startDate)}</span>
            ${S.syncBusy ? `<span style="color:var(--muted);margin-left:8px">${esc(S.syncProgress || "Syncing…")}</span>` : ""}
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn-ghost" id="btn-sync-plan" ${S.syncBusy ? "disabled style='opacity:.6'" : ""}>Sync now</button>
            <button class="btn-plain" id="btn-remove-plan">Remove plan</button>
          </div>
        </div>` : ""}

      ${S.planning ? `
        <div class="panel">
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
            <input class="field" type="number" placeholder="Monthly amount (₪)" id="plan-amount" value="${esc(S.planForm.amount)}" />
            <input class="field" type="date" id="plan-date" value="${esc(S.planForm.startDate)}" />
            <button class="btn-teal" id="btn-save-plan">Save plan</button>
          </div>
          <div class="hint">Deposits the same amount every month on this day, starting from the start date, through the current month. I'll look up market data for each month automatically.</div>
        </div>` : ""}

      ${S.adding ? `
        <div class="panel">
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
            <input class="field" type="number" placeholder="Amount (₪)" id="add-amount" value="${esc(S.form.amount)}" />
            <input class="field" type="date" id="add-date" value="${esc(S.form.date)}" />
            <button class="btn-teal" id="btn-add-deposit" ${S.addBusy ? "disabled" : ""}>${S.addBusy ? "Looking up rates…" : "Add"}</button>
          </div>
          <div class="hint">I'll look up the S&amp;P 500 and USD/ILS rate for that date automatically.</div>
        </div>` : ""}

      ${deposits.map((d) => d.id === S.editingId ? `
        <div class="panel" style="margin-top:12px">
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
            <input class="field" type="number" placeholder="Amount (₪)" id="edit-amount" value="${esc(S.editForm.amount)}" />
            <input class="field" type="date" id="edit-date" value="${esc(S.editForm.date)}" />
            <button class="btn-teal" id="btn-save-edit" data-id="${esc(d.id)}" ${S.editBusy ? "disabled" : ""}>${S.editBusy ? "Updating rates…" : "Save"}</button>
            <button class="btn-ghost" id="btn-cancel-edit">Cancel</button>
          </div>
          <div class="hint">Changing the date re-fetches the S&amp;P 500 level and exchange rate for that day.</div>
        </div>` : `
        <div class="deposit-row">
          <div>
            <div style="font-weight:600;font-size:15px">${esc(fund.name)}</div>
            <div class="mono" style="font-size:13px;color:var(--muted)">${nis(d.amountNIS)} · ${esc(d.date)}</div>
          </div>
          <div style="text-align:right;display:flex;align-items:center;gap:12px">
            <div>
              <div style="font-weight:600;font-size:15px">${nis(d.current)}</div>
              <div style="font-size:13px;color:${d.current >= d.amountNIS ? "var(--teal)" : "var(--clay)"}">${pct((d.current / d.amountNIS - 1) * 100)}</div>
            </div>
            <button class="icon-btn" title="Edit" data-edit="${esc(d.id)}" style="font-size:16px">✎</button>
            <button class="icon-btn" title="Remove" data-remove="${esc(d.id)}" style="font-size:18px">×</button>
          </div>
        </div>`).join("")}
    </div>

    <div style="font-size:12px;color:var(--muted);margin-top:20px;line-height:1.6;border-top:1px solid var(--hair);padding-top:14px">
      Figures use index price levels; reinvested dividends (~1.2%/yr) and fund fees roughly offset and aren't separately modeled. Refresh pulls the latest available close — not live tick data. Paper value only; nothing is realized until you sell.
    </div>
  `;

  document.getElementById("app").innerHTML = html;
  wireFundPage(fund);
}

function wireHome() {
  const $ = (id) => document.getElementById(id);
  $("btn-toggle-new-fund")?.addEventListener("click", toggleNewFund);
  $("nf-name")?.addEventListener("input", (e) => { S.newFund.name = e.target.value; });
  $("nf-hedged")?.addEventListener("change", (e) => { S.newFund.hedged = e.target.checked; });
  $("nf-mode-monthly")?.addEventListener("click", () => setNewFundMode("monthly"));
  $("nf-mode-single")?.addEventListener("click", () => setNewFundMode("single"));
  $("nf-plan-amount")?.addEventListener("input", (e) => { S.newFund.planForm.amount = e.target.value; });
  $("nf-plan-date")?.addEventListener("input", (e) => { S.newFund.planForm.startDate = e.target.value; });
  $("nf-amount")?.addEventListener("input", (e) => { S.newFund.form.amount = e.target.value; });
  $("nf-date")?.addEventListener("input", (e) => { S.newFund.form.date = e.target.value; });
  $("btn-create-fund")?.addEventListener("click", createFund);

  document.querySelectorAll("[data-fund]").forEach((el) =>
    el.addEventListener("click", () => {
      S.screen = "fund";
      S.activeFundId = el.dataset.fund;
      S.error = "";
      render();
    })
  );
}

function wireFundPage(fund) {
  const $ = (id) => document.getElementById(id);
  $("btn-back-home")?.addEventListener("click", () => { S.screen = "home"; S.error = ""; render(); });
  $("btn-toggle-plan")?.addEventListener("click", () => { S.planning = !S.planning; render(); });
  $("btn-toggle-add")?.addEventListener("click", () => { S.adding = !S.adding; render(); });
  $("btn-sync-plan")?.addEventListener("click", runSyncPlan);
  $("btn-remove-plan")?.addEventListener("click", removePlan);
  $("btn-save-plan")?.addEventListener("click", savePlan);
  $("btn-add-deposit")?.addEventListener("click", addDeposit);
  $("btn-save-edit")?.addEventListener("click", () => {
    const orig = fund.deposits.find((d) => d.id === S.editingId);
    saveEdit(orig);
  });
  $("btn-cancel-edit")?.addEventListener("click", () => { S.editingId = null; render(); });

  $("plan-amount")?.addEventListener("input", (e) => { S.planForm.amount = e.target.value; });
  $("plan-date")?.addEventListener("input", (e) => { S.planForm.startDate = e.target.value; });

  $("add-amount")?.addEventListener("input", (e) => { S.form.amount = e.target.value; });
  $("add-date")?.addEventListener("input", (e) => { S.form.date = e.target.value; });

  $("edit-amount")?.addEventListener("input", (e) => { S.editForm.amount = e.target.value; });
  $("edit-date")?.addEventListener("input", (e) => { S.editForm.date = e.target.value; });

  document.querySelectorAll("[data-edit]").forEach((btn) =>
    btn.addEventListener("click", () => startEdit(fund.deposits.find((d) => d.id === btn.dataset.edit)))
  );
  document.querySelectorAll("[data-remove]").forEach((btn) =>
    btn.addEventListener("click", () => remove(btn.dataset.remove))
  );
}

render();
refresh();
(async function catchUpAllPlans() {
  for (const fund of S.funds) {
    if (!fund.plan) continue;
    try {
      await syncPlan(fund);
      render();
    } catch (e) {
      // background catch-up failure — user can retry via "Sync now" on that fund's page
    }
  }
})();
</script>
</body>
</html>
